# ABK external module metadata.
#
# Keep this file shell-compatible because setup.sh sources it, and keep values
# plain because the ABK app and module catalogs parse it before adding modules.

ABK_MODULE_ID="abk_external_module_template"
ABK_MODULE_NAME="ABK External Module Template"
ABK_MODULE_VERSION="0.2.0"
ABK_MODULE_DESCRIPTION="Template for AnyBase Kernel custom external modules."
ABK_MODULE_REPO_URL="https://github.com/your-name/your-module"
ABK_MODULE_SUPPORTED_STAGES="after_patch,before_build"
ABK_MODULE_DEFAULT_STAGE="after_patch"
ABK_MODULE_RECOMMENDED_STAGES="after_patch"
